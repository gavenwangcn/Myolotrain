services:
  db:
    image: postgres:13
    container_name: myolotrain_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yolov8_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: myolotrain_web
    ports:
      - "8013:8000"
      - "6006:6006"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yolov8_platform
      NVIDIA_VISIBLE_DEVICES: all
      UVICORN_RELOAD: "false"
      DEBUG: "false"
    volumes:
      - ./app/static:/app/app/static
      - ./logs:/app/logs
      - ./models:/app/models
    restart: always
    gpus: all

volumes:
  postgres_data:
