<div class="row mb-4">
    <div class="col">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h4><i class="bi bi-people"></i> 用户管理</h4>
                    <button id="add-user-btn" class="btn btn-primary">
                        <i class="bi bi-plus"></i> 添加用户
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort-field="id">ID <i class="bi bi-sort"></i></th>
                                <th class="sortable" data-sort-field="username">用户名 <i class="bi bi-sort"></i></th>
                                <th class="sortable" data-sort-field="role">角色 <i class="bi bi-sort"></i></th>
                                <th class="sortable" data-sort-field="is_active">状态 <i class="bi bi-sort"></i></th>
                                <th class="sortable" data-sort-field="created_at">创建时间 <i class="bi bi-sort"></i></th>
                                <th class="sortable" data-sort-field="last_login">最后登录 <i class="bi bi-sort"></i></th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- 用户数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
