version: '3.8'

services:
  db:
    image: postgres:13
    container_name: yolov8_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yolov8_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    container_name: yolov8_web
    ports:
      - "8000:8000"
      - "6006:6006"
    depends_on:
      db:
          condition: service_healthy
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yolov8_platform
    volumes:
      - ./app/static:/app/app/static
      - ./logs:/app/logs
    restart: always

volumes:
  postgres_data: